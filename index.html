const CSS = `:root{--forest:#14532d;--leaf:#3f9142;--leaf-soft:#e7f2e6;--water:#1f83c6;--water-soft:#e4f1fb;
    --paper:#faf9f1;--card:#fff;--ink:#17231c;--muted:#6a7a70;--line:#e7e6da;
    --amber:#c9862a;--amber-soft:#fbf1de;--rose:#d0433f;--rose-soft:#fbe6e5;--slate:#5b6b78;--slate-soft:#eaeef1;
    --radius:16px;--shadow:0 1px 2px rgba(20,40,30,.04),0 8px 24px -12px rgba(20,60,40,.18);}
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
    background:radial-gradient(1200px 400px at 100% -10%,#eaf4ea 0%,transparent 60%),radial-gradient(900px 500px at -10% 110%,#e6f0f8 0%,transparent 55%),#f4f3ea;
    color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px}
  .hide{display:none !important}

  .app{display:flex;min-height:100vh}
  .side{width:250px;flex:0 0 250px;background:var(--forest);color:#dfeee3;padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px}
  .brand{display:flex;align-items:center;gap:11px;padding:4px 8px 20px}
  .brand .mark{width:40px;height:40px;border-radius:12px;flex:0 0 40px;background:linear-gradient(160deg,#eafff2,#bfe6cf);display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.4)}
  .brand .mark svg{width:23px;height:23px}
  .brand b{display:block;font-size:15px;color:#fff;letter-spacing:-.02em;line-height:1.2}
  .brand small{display:block;font-size:11px;color:#8fc4a3;letter-spacing:.02em;margin-top:2px}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:4px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 13px;border-radius:11px;color:#bfe0cb;font-size:14px;font-weight:600;transition:background .14s,color .14s}
  .nav button svg{width:18px;height:18px;opacity:.9;flex:0 0 18px}
