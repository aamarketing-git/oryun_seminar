const CSS = `:root{--forest:#14532d;--leaf:#3f9142;--leaf-soft:#e7f2e6;--water:#1f83c6;--water-soft:#e4f1fb;
    --paper:#faf9f1;--card:#fff;--ink:#17231c;--muted:#6a7a70;--line:#e7e6da;
    --amber:#c9862a;--amber-soft:#fbf1de;--rose:#d0433f;--rose-soft:#fbe6e5;--slate:#5b6b78;--slate-soft:#eaeef1;
    --radius:16px;--shadow:0 1px 2px rgba(20,40,30,.04),0 8px 24px -12px rgba(20,60,40,.18);}
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
    background:radial-gradient(1200px 400px at 100% -10%,#eaf4ea 0%,transparent 60%),radial-gradient(900px 500px at -10% 110%,#e6f0f8 0%,transparent 55%),#f4f3ea;
    color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px}
  .hide{display:none !important}

  .app{display:flex;min-height:100vh}
  .side{width:250px;flex:0 0 250px;background:var(--forest);color:#dfeee3;padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px}
  .brand{display:flex;align-items:center;gap:11px;padding:4px 8px 20px}
  .brand .mark{width:40px;height:40px;border-radius:12px;flex:0 0 40px;background:linear-gradient(160deg,#eafff2,#bfe6cf);display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.4)}
  .brand .mark svg{width:23px;height:23px}
  .brand b{display:block;font-size:15px;color:#fff;letter-spacing:-.02em;line-height:1.2}
  .brand small{display:block;font-size:11px;color:#8fc4a3;letter-spacing:.02em;margin-top:2px}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:4px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 13px;border-radius:11px;color:#bfe0cb;font-size:14px;font-weight:600;transition:background .14s,color .14s}
  .nav button svg{width:18px;height:18px;opacity:.9;flex:0 0 18px}
  .nav button .badge{margin-left:auto;background:#0d3d20;color:#a7ecc0;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;min-width:22px;text-align:center}
  .nav button:hover{background:rgba(255,255,255,.06);color:#eafff2}
  .nav button.on{background:#eafff2;color:var(--forest)} .nav button.on svg{opacity:1}
  .nav button.on .badge{background:var(--forest);color:#a7ecc0}
  .side .foot{margin-top:auto;font-size:11px;color:#6ba884;padding:12px 8px 2px;line-height:1.6}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:14px;padding:16px 30px;background:rgba(255,255,255,.72);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .topbar h1{font-size:19px;margin:0;letter-spacing:-.03em}
  .topbar .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
  .who{margin-left:auto;display:flex;align-items:center;gap:8px}
  .who .id{display:flex;flex-direction:column;align-items:flex-end;margin-right:4px}
  .who .id b{font-size:13px} .who .id span{font-size:11px;color:var(--muted)}
  .who select{padding:8px 11px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:600;color:var(--ink)}
  .who .ic{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;color:var(--muted)}
  .who .ic:hover{background:#f6faf6;color:var(--forest)} .who .ic svg{width:17px;height:17px}
  .content{padding:26px 30px 60px;max-width:1240px;width:100%}

  .eyebrow{font-size:11.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--leaf)}
  h2.sec{font-size:22px;letter-spacing:-.03em;margin:3px 0 2px}
  .sec-desc{color:var(--muted);font-size:13.5px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 15px;border-radius:11px;font-weight:700;font-size:13.5px;background:var(--forest);color:#fff;transition:filter .14s,transform .05s}
  .btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(1px)} .btn svg{width:16px;height:16px}
  .btn.ghost{background:#fff;color:var(--forest);border:1px solid var(--line)} .btn.ghost:hover{background:#f6faf6}
  .btn.blue{background:var(--water)} .btn.full{width:100%;justify-content:center}
  .btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px}
  .btn.danger{background:#fff;color:var(--rose);border:1px solid var(--rose-soft)}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .chip .dot{width:6px;height:6px;border-radius:50%}
  .s-requested{background:var(--amber-soft);color:var(--amber)} .s-requested .dot{background:var(--amber)}
  .s-approved{background:var(--leaf-soft);color:var(--leaf)} .s-approved .dot{background:var(--leaf)}
  .s-shipped{background:var(--water-soft);color:var(--water)} .s-shipped .dot{background:var(--water)}
  .s-paid{background:#e9f7ee;color:#1f9d55} .s-paid .dot{background:#1f9d55}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{padding:17px 18px;position:relative;overflow:hidden}
  .kpi .k-top{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;font-weight:700}
  .kpi .k-top svg{width:15px;height:15px}
  .kpi .num{font-size:32px;font-weight:800;letter-spacing:-.04em;margin-top:8px;line-height:1}
  .kpi .num small{font-size:14px;font-weight:700;color:var(--muted);margin-left:3px}
  .kpi .k-note{font-size:11.5px;color:var(--muted);margin-top:5px}
  .kpi::after{content:"";position:absolute;right:-30px;bottom:-30px;width:90px;height:90px;border-radius:50%;opacity:.5}
  .kpi.a::after{background:radial-gradient(circle,var(--amber-soft),transparent 70%)}
  .kpi.b::after{background:radial-gradient(circle,var(--water-soft),transparent 70%)}
  .kpi.c::after{background:radial-gradient(circle,#e9f7ee,transparent 70%)}
  .kpi.d::after{background:radial-gradient(circle,var(--leaf-soft),transparent 70%)}

  .pipe{display:flex;align-items:center;gap:0;flex-wrap:wrap}
  .drop{width:24px;height:24px;flex:0 0 24px;display:grid;place-items:center}
  .drop svg{width:22px;height:22px}
  .pipe .link{width:20px;height:2px;background:var(--line);margin:0 4px;border-radius:2px}
  .pipe .link.done{background:var(--leaf)}

  .tbl-wrap{overflow-x:auto;border-radius:var(--radius)}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:820px}
  thead th{text-align:left;font-size:11.5px;font-weight:800;color:var(--muted);padding:12px 14px;background:#f6f7f1;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none} tbody tr:hover{background:#fbfcf8}
  .cell-main{font-weight:700} .cell-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .toolbar .grow{flex:1}
  .filter{display:flex;background:#eef0e9;border-radius:10px;padding:3px;flex-wrap:wrap}
  .filter button{padding:7px 12px;border-radius:8px;font-size:12.5px;font-weight:700;color:var(--muted)}
  .filter button.on{background:#fff;color:var(--forest);box-shadow:0 1px 2px rgba(0,0,0,.06)}

  .range{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .range input{padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .range .lbl{font-size:12px;font-weight:700;color:var(--muted)}
  .sheet table{min-width:1180px;font-size:12.5px}
  .sheet thead th{position:sticky;top:0;z-index:2;text-align:center}
  .sheet thead th.l{text-align:left}
  .sheet tbody td{padding:9px 11px;text-align:center;white-space:nowrap}
  .sheet tbody td.l{text-align:left}
  .sheet td.date{font-weight:800;color:var(--forest)}
  .sheet tbody tr.newdate td{border-top:2px solid #dfe3d8}
  .mk-ok{color:#1f9d55;font-weight:800} .mk-no{color:#c9cfc5} .mk-rep{color:var(--amber);font-weight:800}
  .sumbar{display:flex;gap:20px;flex-wrap:wrap;padding:14px 18px;margin-bottom:16px}
  .sumbar .s b{font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--forest)}
  .sumbar .s span{display:block;font-size:11.5px;color:var(--muted);font-weight:700;margin-top:1px}
  .sumbar .s b small{font-size:13px;color:var(--muted);font-weight:700}

  .overlay{position:fixed;inset:0;background:rgba(20,35,25,.42);backdrop-filter:blur(3px);z-index:80;display:grid;place-items:center;padding:20px}
  .overlay.login{background:linear-gradient(160deg,#12492a,#0c3a22)}
  .modal{background:#fff;border-radius:20px;width:100%;max-width:600px;max-height:92vh;overflow:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.4)}
  .modal.narrow{max-width:420px}
  .modal-h{display:flex;align-items:center;gap:10px;padding:20px 24px 6px}
  .modal-h h3{margin:0;font-size:18px;letter-spacing:-.02em}
  .modal-h .x{margin-left:auto;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--muted);font-size:20px}
  .modal-h .x:hover{background:#f1f2ec}
  .modal-b{padding:14px 24px 24px}
  .field{margin-bottom:14px}
